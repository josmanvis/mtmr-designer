name: Build MTMR Designer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install

      - name: Build web app
        run: pnpm run build

      - name: Bundle web app into Xcode project
        run: |
          mkdir -p mtmr-src/MTMR/WebApp
          cp -r dist/* mtmr-src/MTMR/WebApp/
          echo "Bundled $(find mtmr-src/MTMR/WebApp -type f | wc -l) files into WebApp"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build MTMR 2026
        run: |
          cd mtmr-src
          xcodebuild \
            -scheme MTMR \
            -configuration Release \
            -derivedDataPath build \
            -archivePath build/MTMR.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | tail -20

      - name: Export app from archive
        run: |
          cd mtmr-src
          mkdir -p Release
          cp -r "build/MTMR.xcarchive/Products/Applications/MTMR 2026.app" Release/
          echo "App size: $(du -sh 'Release/MTMR 2026.app' | cut -f1)"

      - name: Extract version
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "mtmr-src/Release/MTMR 2026.app/Contents/Info.plist")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION"

      - name: Create DMG
        run: |
          cd mtmr-src/Release
          npm install -g create-dmg
          create-dmg "MTMR 2026.app" --overwrite 2>&1 || true
          DMG_FILE=$(ls *.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_FILE" ]; then
            mv "$DMG_FILE" "MTMR-2026-${{ steps.version.outputs.version }}.dmg"
            echo "DMG created with create-dmg: $(du -sh "MTMR-2026-${{ steps.version.outputs.version }}.dmg" | cut -f1)"
          else
            echo "create-dmg failed, falling back to hdiutil"
            hdiutil create -volname "MTMR 2026" -srcfolder "MTMR 2026.app" -ov -format UDZO "MTMR-2026-${{ steps.version.outputs.version }}.dmg"
            echo "DMG created with hdiutil: $(du -sh "MTMR-2026-${{ steps.version.outputs.version }}.dmg" | cut -f1)"
          fi

      - name: Create ZIP
        run: |
          cd mtmr-src/Release
          zip -r -y "MTMR-Designer.zip" "MTMR 2026.app"
          echo "ZIP size: $(du -sh MTMR-Designer.zip | cut -f1)"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MTMR-Designer-DMG
          path: mtmr-src/Release/MTMR-2026-${{ steps.version.outputs.version }}.dmg

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: MTMR-Designer-ZIP
          path: mtmr-src/Release/MTMR-Designer.zip

      - name: Generate release tag
        id: tag
        if: github.event_name == 'push'
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "release_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            TAG="v${{ steps.version.outputs.version }}-build.${{ github.run_number }}"
            echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
            echo "release_name=MTMR 2026 ${{ steps.version.outputs.version }} (Build ${{ github.run_number }})" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: ${{ steps.tag.outputs.release_name }}
          files: |
            mtmr-src/Release/MTMR-2026-${{ steps.version.outputs.version }}.dmg
            mtmr-src/Release/MTMR-Designer.zip
          generate_release_notes: true
